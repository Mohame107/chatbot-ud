<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard Admin — Chatbot UD</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --green:       #1a5c2a;
      --green-light: #237a38;
      --green-pale:  #e8f5eb;
      --gold:        #c9a84c;
      --gold-light:  #f5e9c8;
      --bg:          #0d1f12;
      --bg2:         #122018;
      --card:        #1a2e1d;
      --border:      rgba(35,122,56,0.3);
      --text:        #e8f5eb;
      --muted:       #6b9e72;
      --mono:        'Space Mono', monospace;
      --sans:        'Syne', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, var(--green) 0%, var(--bg2) 100%);
      border-bottom: 1px solid var(--border);
      padding: 24px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }

    .header-left { display: flex; align-items: center; gap: 16px; }

    .header-logo {
      width: 44px; height: 44px;
      background: var(--gold);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }

    .header-title {
      font-size: 20px; font-weight: 800;
      letter-spacing: -0.5px;
    }

    .header-sub {
      font-size: 11px; color: var(--muted);
      font-family: var(--mono);
      margin-top: 2px;
    }

    .header-actions { display: flex; gap: 10px; align-items: center; }

    .btn {
      font-family: var(--sans);
      font-size: 12px; font-weight: 600;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--gold);
      color: #1a1a0a;
    }
    .btn-primary:hover { background: #e0bc5a; transform: translateY(-1px); }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .btn-outline:hover { border-color: var(--gold); color: var(--gold); }

    .live-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 0 3px rgba(74,222,128,0.2);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 3px rgba(74,222,128,0.2); }
      50%      { box-shadow: 0 0 0 6px rgba(74,222,128,0.05); }
    }

    /* ── Layout ── */
    .container { padding: 32px 40px; max-width: 1400px; margin: 0 auto; }

    /* ── KPI Cards ── */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .kpi-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 24px;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.4s ease both;
    }

    .kpi-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--gold), transparent);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .kpi-icon { font-size: 24px; margin-bottom: 12px; }
    .kpi-value {
      font-family: var(--mono);
      font-size: 32px; font-weight: 700;
      color: var(--gold);
      line-height: 1;
    }
    .kpi-label {
      font-size: 12px; color: var(--muted);
      margin-top: 6px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .kpi-delta {
      font-family: var(--mono);
      font-size: 11px;
      margin-top: 4px;
    }
    .kpi-delta.up { color: #4ade80; }
    .kpi-delta.down { color: #f87171; }

    /* ── Charts Grid ── */
    .charts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }

    @media (max-width: 900px) {
      .charts-grid { grid-template-columns: 1fr; }
      .container { padding: 20px; }
      .header { padding: 16px 20px; }
    }

    .chart-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      animation: fadeUp 0.5s ease both;
    }

    .chart-title {
      font-size: 13px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 20px;
      display: flex; align-items: center; gap: 8px;
    }

    /* ── Bar charts ── */
    .bar-list { display: flex; flex-direction: column; gap: 10px; }

    .bar-item { display: flex; align-items: center; gap: 12px; }

    .bar-label {
      font-size: 12px; font-family: var(--mono);
      color: var(--text); min-width: 130px;
      white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis;
    }

    .bar-track {
      flex: 1; height: 8px;
      background: rgba(255,255,255,0.05);
      border-radius: 4px; overflow: hidden;
    }

    .bar-fill {
      height: 100%; border-radius: 4px;
      background: linear-gradient(90deg, var(--gold), var(--green-light));
      transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .bar-val {
      font-family: var(--mono);
      font-size: 11px; color: var(--muted);
      min-width: 30px; text-align: right;
    }

    /* ── Donut chart (CSS) ── */
    .donut-wrap {
      display: flex; align-items: center;
      gap: 24px; flex-wrap: wrap;
    }

    .donut-chart {
      position: relative;
      width: 120px; height: 120px;
      flex-shrink: 0;
    }

    .donut-svg { transform: rotate(-90deg); }

    .donut-center {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .donut-pct {
      font-family: var(--mono);
      font-size: 20px; font-weight: 700;
      color: var(--gold);
    }

    .donut-sub { font-size: 9px; color: var(--muted); }

    .legend { display: flex; flex-direction: column; gap: 8px; flex: 1; }

    .legend-item {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px;
    }

    .legend-dot {
      width: 8px; height: 8px;
      border-radius: 50%; flex-shrink: 0;
    }

    .legend-name { color: var(--text); flex: 1; }
    .legend-count { font-family: var(--mono); color: var(--muted); font-size: 11px; }

    /* ── Activity chart ── */
    .activity-chart {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      height: 80px;
    }

    .activity-col { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }

    .activity-bar {
      width: 100%; border-radius: 4px 4px 0 0;
      background: linear-gradient(180deg, var(--gold), var(--green-light));
      min-height: 4px;
      transition: height 0.8s ease;
    }

    .activity-day { font-size: 9px; color: var(--muted); font-family: var(--mono); }

    /* ── Table questions ── */
    .table-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 24px;
      animation: fadeUp 0.6s ease both;
    }

    .table-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      justify-content: space-between;
    }

    .table-title {
      font-size: 13px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px;
      color: var(--muted);
    }

    .badge {
      background: rgba(201,168,76,0.15);
      color: var(--gold);
      border: 1px solid rgba(201,168,76,0.3);
      font-size: 11px; padding: 2px 8px;
      border-radius: 6px; font-family: var(--mono);
    }

    table { width: 100%; border-collapse: collapse; }

    th {
      padding: 10px 24px;
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.8px;
      color: var(--muted);
      background: rgba(255,255,255,0.02);
      text-align: left;
    }

    td {
      padding: 12px 24px;
      font-size: 12px;
      border-top: 1px solid rgba(255,255,255,0.04);
      vertical-align: middle;
    }

    tr:hover td { background: rgba(255,255,255,0.02); }

    .lang-tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 6px;
      font-family: var(--mono);
      font-size: 10px; font-weight: 700;
    }

    .lang-fr { background: rgba(59,130,246,0.2); color: #93c5fd; }
    .lang-ar { background: rgba(34,197,94,0.2);  color: #86efac; }
    .lang-so { background: rgba(251,146,60,0.2); color: #fdba74; }
    .lang-en { background: rgba(168,85,247,0.2); color: #d8b4fe; }
    .lang-aa { background: rgba(236,72,153,0.2); color: #f9a8d4; }

    .feedback-pos { color: #4ade80; font-size: 14px; }
    .feedback-neg { color: #f87171; font-size: 14px; }
    .feedback-none { color: var(--muted); font-size: 12px; }

    .intent-tag {
      font-family: var(--mono); font-size: 10px;
      color: var(--muted);
      background: rgba(255,255,255,0.05);
      padding: 2px 6px; border-radius: 4px;
    }

    /* ── Empty / Loading states ── */
    .empty-state {
      text-align: center; padding: 60px 20px;
      color: var(--muted);
    }

    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
    .empty-sub { font-size: 13px; }

    .loading {
      text-align: center; padding: 40px;
      color: var(--muted); font-family: var(--mono);
      font-size: 12px;
    }

    /* ── Satisfaction gauge ── */
    .sat-gauge {
      display: flex; align-items: center; gap: 16px;
    }

    .sat-number {
      font-family: var(--mono);
      font-size: 48px; font-weight: 700;
      color: var(--gold); line-height: 1;
    }

    .sat-label { font-size: 12px; color: var(--muted); margin-top: 4px; }

    .sat-bars { flex: 1; display: flex; flex-direction: column; gap: 6px; }

    .sat-row { display: flex; align-items: center; gap: 8px; font-size: 11px; }
    .sat-emoji { font-size: 14px; }
    .sat-track { flex:1; height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden; }
    .sat-fill-pos { height:100%; border-radius:3px; background: #4ade80; }
    .sat-fill-neg { height:100%; border-radius:3px; background: #f87171; }
    .sat-pct { font-family: var(--mono); color: var(--muted); min-width: 32px; text-align: right; }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <div class="header-logo">📊</div>
    <div>
      <div class="header-title">Dashboard Admin — Chatbot UD</div>
      <div class="header-sub" id="lastUpdate">Chargement...</div>
    </div>
  </div>
  <div class="header-actions">
    <div class="live-dot"></div>
    <button class="btn btn-outline" onclick="exportCSV()">⬇ Exporter CSV</button>
    <button class="btn btn-primary" onclick="loadData()">🔄 Actualiser</button>
  </div>
</div>

<div class="container">

  <!-- KPI Cards -->
  <div class="kpi-grid" id="kpiGrid">
    <div class="loading">Chargement des données...</div>
  </div>

  <!-- Charts -->
  <div class="charts-grid">
    <div class="chart-card">
      <div class="chart-title">📊 Top intents</div>
      <div class="bar-list" id="intentChart"></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">🌍 Langues détectées</div>
      <div class="donut-wrap" id="langChart"></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">😊 Satisfaction utilisateurs</div>
      <div id="satChart"></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">📅 Activité (7 derniers jours)</div>
      <div class="activity-chart" id="activityChart"></div>
    </div>
  </div>

  <!-- Table dernières questions -->
  <div class="table-card">
    <div class="table-header">
      <div class="table-title">💬 Dernières questions</div>
      <div class="badge" id="totalBadge">0 entrées</div>
    </div>
    <div id="tableContainer">
      <div class="loading">Chargement...</div>
    </div>
  </div>

</div>

<script>
// ══════════════════════════════════════════
// CONFIGURATION
// ══════════════════════════════════════════
// Le dashboard essaie plusieurs chemins dans l'ordre
const LOG_URLS = [
  "http://localhost:8080/questions_log.json",
  "http://127.0.0.1:8080/questions_log.json",
  "../backend/data/questions_log.json",
  "./questions_log.json",
];

let allLogs = [];

const INTENT_LABELS = {
  "demander_procedure"  : "📋 Procédure",
  "demander_frais"      : "💰 Frais",
  "demander_facultes"   : "🏛️ Facultés",
  "demander_formations" : "🎓 Formations",
  "demander_documents"  : "📎 Documents",
  "demander_dates"      : "📅 Dates",
  "demander_ecampus"    : "💻 eCampus",
  "demander_contact"    : "📞 Contact",
  "demander_logement"   : "🏠 Logement",
  "demander_bourse"     : "💶 Bourse",
  "demander_conditions" : "✅ Conditions",
  "signaler_probleme"   : "🔧 Problème",
  "fallback"            : "❓ Fallback",
};

const LANG_COLORS = {
  "fr": "#3b82f6", "ar": "#22c55e",
  "so": "#fb923c", "en": "#a855f7", "aa": "#ec4899"
};

const LANG_NAMES = {
  "fr": "Français", "ar": "Arabe",
  "so": "Somali",   "en": "Anglais", "aa": "Afar"
};

// ══════════════════════════════════════════
// CHARGEMENT DES DONNÉES
// ══════════════════════════════════════════
async function loadData() {
  let data = null;
  let usedUrl = null;

  // Essayer chaque URL dans l'ordre
  for (const url of LOG_URLS) {
    try {
      const res = await fetch(url + "?t=" + Date.now(), {
        signal: AbortSignal.timeout(2000),
        cache: "no-store"
      });
      if (res.ok) {
        const json = await res.json();
        if (Array.isArray(json)) {
          data = json;
          usedUrl = url;
          break;
        }
      }
    } catch(e) {
      // Essayer l'URL suivante
      continue;
    }
  }

  if (data) {
    allLogs = data;
    renderAll(allLogs);
    document.getElementById("lastUpdate").textContent =
      "Mis à jour : " + new Date().toLocaleTimeString("fr-FR") +
      " (" + data.length + " entrées)";
  } else {
    showDemoData();
  }
}

// ══════════════════════════════════════════
// DONNÉES DE DÉMO (si pas de serveur)
// ══════════════════════════════════════════
function showDemoData() {
  const now = new Date();
  const demo = [];
  const intents = ["demander_procedure","demander_frais","demander_facultes",
                   "demander_documents","demander_ecampus","demander_dates",
                   "demander_contact","fallback","demander_bourse"];
  const langs = ["fr","fr","fr","ar","so","en","fr","ar"];
  const questions = [
    "Comment s'inscrire à l'université ?",
    "Quels sont les frais d'inscription ?",
    "Quelles sont les facultés disponibles ?",
    "كيف أسجل في الجامعة؟",
    "Sideen u diiwaangeliyaa?",
    "What are the registration fees?",
    "Comment se connecter à eCampus ?",
    "Quels documents fournir ?",
    "Est-ce qu'il y a des bourses ?"
  ];
  const feedbacks = ["positif","positif","negatif",null,"positif",null,"positif","positif",null];

  for (let i = 0; i < 40; i++) {
    const idx = i % intents.length;
    const d = new Date(now - (i * 3600000 * Math.random() * 5));
    demo.push({
      date: d.toISOString(),
      langue: langs[idx],
      question: questions[idx],
      intent: intents[idx],
      response: "Réponse générée...",
      feedback: feedbacks[idx]
    });
  }

  allLogs = demo;
  renderAll(demo);
  document.getElementById("lastUpdate").textContent =
    "⚠️ Mode démo — démarrez Rasa pour les vraies données";
}

// ══════════════════════════════════════════
// RENDU
// ══════════════════════════════════════════
function renderAll(logs) {
  renderKPIs(logs);
  renderIntentChart(logs);
  renderLangChart(logs);
  renderSatChart(logs);
  renderActivityChart(logs);
  renderTable(logs);
  document.getElementById("totalBadge").textContent = logs.length + " entrées";
}

function renderKPIs(logs) {
  const total = logs.length;
  const today = new Date().toDateString();
  const todayCount = logs.filter(l => new Date(l.date).toDateString() === today).length;
  const withFeedback = logs.filter(l => l.feedback);
  const positif = withFeedback.filter(l => l.feedback === "positif").length;
  const satRate = withFeedback.length > 0
    ? Math.round((positif / withFeedback.length) * 100) : 0;
  const fallbacks = logs.filter(l => l.intent === "fallback").length;
  const fallbackRate = total > 0 ? Math.round((fallbacks / total) * 100) : 0;

  const langCount = {};
  logs.forEach(l => { langCount[l.langue] = (langCount[l.langue] || 0) + 1; });
  const topLang = Object.entries(langCount).sort((a,b) => b[1]-a[1])[0];

  document.getElementById("kpiGrid").innerHTML = `
    <div class="kpi-card" style="animation-delay:0.0s">
      <div class="kpi-icon">💬</div>
      <div class="kpi-value">${total}</div>
      <div class="kpi-label">Questions totales</div>
      <div class="kpi-delta up">+${todayCount} aujourd'hui</div>
    </div>
    <div class="kpi-card" style="animation-delay:0.1s">
      <div class="kpi-icon">😊</div>
      <div class="kpi-value">${satRate}%</div>
      <div class="kpi-label">Satisfaction</div>
      <div class="kpi-delta ${satRate >= 70 ? 'up' : 'down'}">${positif}/${withFeedback.length} évaluées</div>
    </div>
    <div class="kpi-card" style="animation-delay:0.2s">
      <div class="kpi-icon">❓</div>
      <div class="kpi-value">${fallbackRate}%</div>
      <div class="kpi-label">Taux de fallback</div>
      <div class="kpi-delta ${fallbackRate <= 20 ? 'up' : 'down'}">${fallbacks} non reconnus</div>
    </div>
    <div class="kpi-card" style="animation-delay:0.3s">
      <div class="kpi-icon">🌍</div>
      <div class="kpi-value">${topLang ? LANG_NAMES[topLang[0]] || topLang[0] : 'N/A'}</div>
      <div class="kpi-label">Langue principale</div>
      <div class="kpi-delta up">${topLang ? topLang[1] : 0} questions</div>
    </div>
  `;
}

function renderIntentChart(logs) {
  const counts = {};
  logs.forEach(l => { counts[l.intent] = (counts[l.intent] || 0) + 1; });
  const sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]).slice(0, 8);
  const max = sorted[0]?.[1] || 1;

  document.getElementById("intentChart").innerHTML = sorted.map(([intent, count]) => `
    <div class="bar-item">
      <div class="bar-label">${INTENT_LABELS[intent] || intent}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${(count/max*100).toFixed(1)}%"></div>
      </div>
      <div class="bar-val">${count}</div>
    </div>
  `).join("") || '<div style="color:var(--muted);font-size:12px">Aucune donnée</div>';
}

function renderLangChart(logs) {
  const counts = {};
  logs.forEach(l => { counts[l.langue] = (counts[l.langue] || 0) + 1; });
  const total = logs.length || 1;
  const entries = Object.entries(counts).sort((a,b) => b[1]-a[1]);
  const topPct = entries[0] ? Math.round(entries[0][1] / total * 100) : 0;
  const topLang = entries[0]?.[0] || "fr";

  // SVG donut
  const r = 45, cx = 60, cy = 60;
  const circumference = 2 * Math.PI * r;
  let offset = 0;
  const segments = entries.map(([lang, count]) => {
    const pct = count / total;
    const dash = pct * circumference;
    const seg = { lang, count, pct, dash, offset };
    offset += dash;
    return seg;
  });

  const donutSVG = `
    <svg class="donut-svg" width="120" height="120" viewBox="0 0 120 120">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="14"/>
      ${segments.map(s => `
        <circle cx="${cx}" cy="${cy}" r="${r}" fill="none"
          stroke="${LANG_COLORS[s.lang] || '#888'}" stroke-width="14"
          stroke-dasharray="${s.dash.toFixed(2)} ${(circumference - s.dash).toFixed(2)}"
          stroke-dashoffset="${-s.offset.toFixed(2)}"
          stroke-linecap="round"/>
      `).join("")}
    </svg>
  `;

  document.getElementById("langChart").innerHTML = `
    <div class="donut-chart">
      ${donutSVG}
      <div class="donut-center">
        <div class="donut-pct">${topPct}%</div>
        <div class="donut-sub">${(LANG_NAMES[topLang]||topLang).slice(0,3).toUpperCase()}</div>
      </div>
    </div>
    <div class="legend">
      ${entries.map(([lang, count]) => `
        <div class="legend-item">
          <div class="legend-dot" style="background:${LANG_COLORS[lang]||'#888'}"></div>
          <div class="legend-name">${LANG_NAMES[lang] || lang}</div>
          <div class="legend-count">${count} (${Math.round(count/total*100)}%)</div>
        </div>
      `).join("")}
    </div>
  `;
}

function renderSatChart(logs) {
  const withFeedback = logs.filter(l => l.feedback);
  const pos = withFeedback.filter(l => l.feedback === "positif").length;
  const neg = withFeedback.filter(l => l.feedback === "negatif").length;
  const total = withFeedback.length || 1;
  const satRate = Math.round(pos / total * 100);

  document.getElementById("satChart").innerHTML = `
    <div class="sat-gauge">
      <div>
        <div class="sat-number">${satRate}%</div>
        <div class="sat-label">${pos} positifs / ${neg} négatifs</div>
      </div>
      <div class="sat-bars">
        <div class="sat-row">
          <span class="sat-emoji">👍</span>
          <div class="sat-track"><div class="sat-fill-pos" style="width:${(pos/total*100).toFixed(1)}%"></div></div>
          <span class="sat-pct">${pos}</span>
        </div>
        <div class="sat-row">
          <span class="sat-emoji">👎</span>
          <div class="sat-track"><div class="sat-fill-neg" style="width:${(neg/total*100).toFixed(1)}%"></div></div>
          <span class="sat-pct">${neg}</span>
        </div>
        <div class="sat-row" style="color:var(--muted);font-size:11px">
          <span class="sat-emoji">—</span>
          <span style="flex:1">Non évalués</span>
          <span class="sat-pct">${logs.length - withFeedback.length}</span>
        </div>
      </div>
    </div>
  `;
}

function renderActivityChart(logs) {
  const days = {};
  const labels = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const key = d.toDateString();
    const label = d.toLocaleDateString("fr-FR", { weekday: "short" });
    days[key] = 0;
    labels.push({ key, label });
  }
  logs.forEach(l => {
    const key = new Date(l.date).toDateString();
    if (days[key] !== undefined) days[key]++;
  });

  const maxVal = Math.max(...Object.values(days), 1);

  document.getElementById("activityChart").innerHTML = labels.map(({ key, label }) => {
    const count = days[key];
    const heightPct = (count / maxVal * 100).toFixed(1);
    return `
      <div class="activity-col">
        <div class="activity-bar" style="height:${heightPct}%;min-height:4px" title="${count} questions"></div>
        <div class="activity-day">${label}</div>
      </div>
    `;
  }).join("");
}

function renderTable(logs) {
  const recent = [...logs].reverse().slice(0, 50);
  if (recent.length === 0) {
    document.getElementById("tableContainer").innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">💬</div>
        <div class="empty-title">Aucune conversation enregistrée</div>
        <div class="empty-sub">Les questions apparaîtront ici dès la première utilisation du chatbot</div>
      </div>`;
    return;
  }

  document.getElementById("tableContainer").innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Heure</th>
          <th>Langue</th>
          <th>Question</th>
          <th>Intent</th>
          <th>Feedback</th>
        </tr>
      </thead>
      <tbody>
        ${recent.map(log => `
          <tr>
            <td style="font-family:var(--mono);font-size:11px;color:var(--muted);white-space:nowrap">
              ${new Date(log.date).toLocaleString("fr-FR", {day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"})}
            </td>
            <td>
              <span class="lang-tag lang-${log.langue || 'fr'}">${(log.langue || 'fr').toUpperCase()}</span>
            </td>
            <td style="max-width:300px">
              <div style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:280px" title="${escapeHtml(log.question || '')}">
                ${escapeHtml(log.question || '—')}
              </div>
            </td>
            <td><span class="intent-tag">${INTENT_LABELS[log.intent] || log.intent || '—'}</span></td>
            <td>
              ${log.feedback === 'positif' ? '<span class="feedback-pos">👍</span>'
              : log.feedback === 'negatif' ? '<span class="feedback-neg">👎</span>'
              : '<span class="feedback-none">—</span>'}
            </td>
          </tr>
        `).join("")}
      </tbody>
    </table>
  `;
}

// ══════════════════════════════════════════
// EXPORT CSV
// ══════════════════════════════════════════
function exportCSV() {
  if (allLogs.length === 0) { alert("Aucune donnée à exporter"); return; }
  const headers = ["Date", "Langue", "Question", "Intent", "Feedback"];
  const rows = allLogs.map(l => [
    new Date(l.date).toLocaleString("fr-FR"),
    l.langue || "",
    `"${(l.question || "").replace(/"/g, '""')}"`,
    l.intent || "",
    l.feedback || ""
  ]);
  const csv = [headers, ...rows].map(r => r.join(";")).join("\n");
  const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `chatbot_ud_logs_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

function escapeHtml(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ── Auto-refresh toutes les 30 secondes
loadData();
setInterval(loadData, 30000);
